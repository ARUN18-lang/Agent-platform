<svg id="mermaid-diagram" width="100%" xmlns="http://www.w3.org/2000/svg" class="flowchart" style="max-width: 276px;" viewBox="0 0 276 686" role="graphics-document document" aria-roledescription="flowchart-v2"><style>#mermaid-diagram{font-family:Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#mermaid-diagram .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#mermaid-diagram .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#mermaid-diagram .error-icon{fill:#552222;}#mermaid-diagram .error-text{fill:#552222;stroke:#552222;}#mermaid-diagram .edge-thickness-normal{stroke-width:1px;}#mermaid-diagram .edge-thickness-thick{stroke-width:3.5px;}#mermaid-diagram .edge-pattern-solid{stroke-dasharray:0;}#mermaid-diagram .edge-thickness-invisible{stroke-width:0;fill:none;}#mermaid-diagram .edge-pattern-dashed{stroke-dasharray:3;}#mermaid-diagram .edge-pattern-dotted{stroke-dasharray:2;}#mermaid-diagram .marker{fill:#333333;stroke:#333333;}#mermaid-diagram .marker.cross{stroke:#333333;}#mermaid-diagram svg{font-family:Arial,sans-serif;font-size:16px;}#mermaid-diagram p{margin:0;}#mermaid-diagram .label{font-family:Arial,sans-serif;color:#333;}#mermaid-diagram .cluster-label text{fill:#333;}#mermaid-diagram .cluster-label span{color:#333;}#mermaid-diagram .cluster-label span p{background-color:transparent;}#mermaid-diagram .label text,#mermaid-diagram span{fill:#333;color:#333;}#mermaid-diagram .node rect,#mermaid-diagram .node circle,#mermaid-diagram .node ellipse,#mermaid-diagram .node polygon,#mermaid-diagram .node path{fill:#ECECFF;stroke:#9370DB;stroke-width:1px;}#mermaid-diagram .rough-node .label text,#mermaid-diagram .node .label text,#mermaid-diagram .image-shape .label,#mermaid-diagram .icon-shape .label{text-anchor:middle;}#mermaid-diagram .node .katex path{fill:#000;stroke:#000;stroke-width:1px;}#mermaid-diagram .rough-node .label,#mermaid-diagram .node .label,#mermaid-diagram .image-shape .label,#mermaid-diagram .icon-shape .label{text-align:center;}#mermaid-diagram .node.clickable{cursor:pointer;}#mermaid-diagram .root .anchor path{fill:#333333!important;stroke-width:0;stroke:#333333;}#mermaid-diagram .arrowheadPath{fill:#333333;}#mermaid-diagram .edgePath .path{stroke:#333333;stroke-width:1px;}#mermaid-diagram .flowchart-link{stroke:#333333;fill:none;}#mermaid-diagram .edgeLabel{background-color:rgba(232,232,232, 0.8);text-align:center;}#mermaid-diagram .edgeLabel p{background-color:rgba(232,232,232, 0.8);}#mermaid-diagram .edgeLabel rect{opacity:0.5;background-color:rgba(232,232,232, 0.8);fill:rgba(232,232,232, 0.8);}#mermaid-diagram .labelBkg{background-color:rgba(232, 232, 232, 0.5);}#mermaid-diagram .cluster rect{fill:#ffffde;stroke:#aaaa33;stroke-width:1px;}#mermaid-diagram .cluster text{fill:#333;}#mermaid-diagram .cluster span{color:#333;}#mermaid-diagram div.mermaidTooltip{position:absolute;text-align:center;max-width:200px;padding:2px;font-family:Arial,sans-serif;font-size:12px;background:hsl(80, 100%, 96.2745098039%);border:1px solid #aaaa33;border-radius:2px;pointer-events:none;z-index:100;}#mermaid-diagram .flowchartTitleText{text-anchor:middle;font-size:18px;fill:#333;}#mermaid-diagram rect.text{fill:none;stroke-width:0;}#mermaid-diagram .icon-shape,#mermaid-diagram .image-shape{background-color:rgba(232,232,232, 0.8);text-align:center;}#mermaid-diagram .icon-shape p,#mermaid-diagram .image-shape p{background-color:rgba(232,232,232, 0.8);padding:2px;}#mermaid-diagram .icon-shape .label rect,#mermaid-diagram .image-shape .label rect{opacity:0.5;background-color:rgba(232,232,232, 0.8);fill:rgba(232,232,232, 0.8);}#mermaid-diagram .label-icon{display:inline-block;height:1em;overflow:visible;vertical-align:-0.125em;}#mermaid-diagram .node .label-icon path{fill:currentColor;stroke:revert;stroke-width:revert;}#mermaid-diagram .node .neo-node{stroke:#9370DB;}#mermaid-diagram [data-look="neo"].node rect,#mermaid-diagram [data-look="neo"].cluster rect,#mermaid-diagram [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#mermaid-diagram [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#mermaid-diagram [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#mermaid-diagram [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#mermaid-diagram [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#mermaid-diagram [data-look="neo"].node circle .state-start{fill:#000000;}#mermaid-diagram [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#mermaid-diagram [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#mermaid-diagram :root{--mermaid-font-family:Arial,sans-serif;}</style><g><marker id="mermaid-diagram_flowchart-v2-pointEnd" class="marker flowchart-v2" viewBox="0 0 10 10" refX="5" refY="5" markerUnits="userSpaceOnUse" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" class="arrowMarkerPath" style="stroke-width: 1; stroke-dasharray: 1, 0;"></path></marker><marker id="mermaid-diagram_flowchart-v2-pointStart" class="marker flowchart-v2" viewBox="0 0 10 10" refX="4.5" refY="5" markerUnits="userSpaceOnUse" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 5 L 10 10 L 10 0 z" class="arrowMarkerPath" style="stroke-width: 1; stroke-dasharray: 1, 0;"></path></marker><marker id="mermaid-diagram_flowchart-v2-pointEnd-margin" class="marker flowchart-v2" viewBox="0 0 11.5 14" refX="11.5" refY="7" markerUnits="userSpaceOnUse" markerWidth="10.5" markerHeight="14" orient="auto"><path d="M 0 0 L 11.5 7 L 0 14 z" class="arrowMarkerPath" style=